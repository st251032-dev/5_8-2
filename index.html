<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高校英文法マスタークエスト</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #f0fdf4; /* 薄い緑色の背景で学習しやすく */
            background-image: radial-gradient(#dcfce7 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* 選択肢ボタンのアクティブエフェクト */
        .option-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- メインコンテナ -->
    <div class="max-w-2xl w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
        
        <!-- ヘッダー -->
        <div class="bg-green-600 text-white p-6 text-center">
            <h1 class="text-2xl md:text-3xl font-bold tracking-wider">高校英文法マスタークエスト</h1>
            <p class="text-green-100 mt-2 text-sm md:text-base">〜大学受験レベルの知識をチェック〜</p>
        </div>

        <div class="p-6 md:p-8">
            
            <!-- スタート画面 -->
            <div id="start-screen" class="text-center py-8 fade-in">
                <div class="text-6xl mb-6">🎓</div>
                <h2 class="text-xl font-bold text-gray-800 mb-4">全10問の文法テストに挑戦！</h2>
                <p class="text-gray-600 mb-8 leading-relaxed">
                    仮定法、関係詞、分詞構文など、高校卒業レベルの重要な英文法問題を用意しました。<br>
                    間違えた問題は解説を読んでしっかり暗記しましょう。
                </p>
                <button onclick="startGame()" class="bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-10 rounded-full shadow-lg transform transition duration-200 hover:-translate-y-1 hover:shadow-xl text-lg">
                    クエストを開始する
                </button>
            </div>

            <!-- ゲーム画面 -->
            <div id="game-screen" class="hidden fade-in">
                <!-- ステータスバー -->
                <div class="flex justify-between items-center mb-6 pb-4 border-b border-gray-200">
                    <div class="bg-gray-100 px-4 py-2 rounded-lg text-gray-700 font-medium">
                        問題 <span id="question-counter" class="text-green-600 font-bold text-lg">1</span> / 10
                    </div>
                    <div class="bg-gray-100 px-4 py-2 rounded-lg text-gray-700 font-medium">
                        スコア: <span id="score-counter" class="text-blue-600 font-bold text-lg">0</span>
                    </div>
                </div>

                <!-- 問題文 -->
                <div class="mb-8">
                    <p id="question-text" class="text-xl md:text-2xl font-medium text-gray-800 leading-normal"></p>
                </div>

                <!-- 選択肢 -->
                <div id="options-container" class="space-y-3 mb-6">
                    <!-- JSで選択肢が生成されます -->
                </div>
                
                <!-- フィードバック（解説）領域 -->
                <div id="feedback-container" class="hidden fade-in">
                    <div class="p-5 rounded-xl mb-6 border" id="feedback-box">
                        <div id="feedback-badge" class="inline-block px-3 py-1 rounded text-sm font-bold mb-3"></div>
                        <p id="explanation-text" class="text-gray-700 leading-relaxed"></p>
                    </div>
                    <button id="next-btn" onclick="nextQuestion()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-4 rounded-xl shadow transition duration-200 text-lg">
                        次の問題へ ➔
                    </button>
                </div>
            </div>

            <!-- 結果画面 -->
            <div id="result-screen" class="hidden text-center py-8 fade-in">
                <div id="result-icon" class="text-7xl mb-4">🏆</div>
                <h2 class="text-3xl font-bold mb-6 text-gray-800">リザルト</h2>
                
                <div class="inline-block bg-gray-50 border-2 border-gray-200 rounded-2xl p-6 mb-8 w-full max-w-sm">
                    <p class="text-gray-500 mb-2">正答数</p>
                    <p class="text-4xl font-bold"><span id="final-score" class="text-green-600"></span> <span class="text-2xl text-gray-400">/ 10</span></p>
                </div>

                <p id="result-message" class="text-xl font-medium text-gray-700 mb-8"></p>
                
                <button onclick="resetGame()" class="bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 px-8 rounded-full shadow transition duration-200 mx-2">
                    タイトルに戻る
                </button>
            </div>

        </div>
    </div>

    <script>
        // --- 問題データ（高校卒業レベルの重要文法） ---
        const quizData = [
            {
                question: "If I ( 　 ) enough money, I would buy that sports car.",
                options: ["have", "had", "will have", "have had"],
                answer: 1, // had
                explanation: "【仮定法過去】現在の事実に反する仮定を表します。<br>公式: If S + <b>過去形</b>, S + would/could/might + 原形。<br>「もし(今)十分なお金があれば、あの車を買うのに」"
            },
            {
                question: "He has three daughters, all of ( 　 ) are married.",
                options: ["who", "whose", "them", "whom"],
                answer: 3, // whom
                explanation: "【関係代名詞の非制限用法】コンマ以降を繋ぐ接続詞の働きと、前置詞(of)の目的語となる代名詞の働きを兼ねるため、目的格の関係代名詞 whom を使います。themだと文が2つ繋がらないため不可です。"
            },
            {
                question: "( 　 ) what to say, he remained silent.",
                options: ["Not knowing", "Knowing not", "Not known", "Known not"],
                answer: 0, // Not knowing
                explanation: "【分詞構文の否定】分詞構文を否定する場合、<b>not や never は分詞(V-ing)の直前</b>に置きます。<br>「何を言うべきかわからなかったので、彼は黙ったままだった」"
            },
            {
                question: "She ( 　 ) have missed the train. She is always punctual.",
                options: ["must", "should", "cannot", "need not"],
                answer: 2, // cannot
                explanation: "【助動詞 ＋ have ＋ 過去分詞】<br><b>cannot have Vp.p.</b> で「〜したはずがない」という意味になります。<br>punctual(時間に正確な)という文脈から、「電車に乗り遅れたはずがない」となります。"
            },
            {
                question: "I'll never forget ( 　 ) her for the first time.",
                options: ["meet", "to meet", "meeting", "met"],
                answer: 2, // meeting
                explanation: "【不定詞と動名詞の使い分け】<br>forget <b>V-ing</b>: 「〜したことを忘れる」（過去の出来事）<br>forget <b>to V</b>: 「〜するのを忘れる」（未来の予定）<br>ここでは「初めて彼女に会ったこと」を忘れないので、動名詞が正解です。"
            },
            {
                question: "The climate of Japan is milder than ( 　 ) of England.",
                options: ["it", "one", "that", "those"],
                answer: 2, // that
                explanation: "【代名詞 that の用法】比較対象を明確にする際、前に出た単数名詞(the climate)の反復を避けるために代名詞 <b>that</b> を使います。複数名詞なら <b>those</b> になります。"
            },
            {
                question: "Hardly ( 　 ) the station when it started to rain.",
                options: ["I had reached", "had I reached", "I reached", "did I reach"],
                answer: 1, // had I reached
                explanation: "【否定語による倒置】Hardly や Scarcely などの否定の副詞が文頭に出ると、後ろの主語と動詞が<b>疑問文の語順(倒置)</b>になります。<br>Hardly had S Vp.p. when ... で「〜するとすぐに...」という意味です。"
            },
            {
                question: "I had my wallet ( 　 ) in the crowded train.",
                options: ["steal", "to steal", "stole", "stolen"],
                answer: 3, // stolen
                explanation: "【使役動詞 have の被害】<b>have + O + 過去分詞(Vp.p.)</b> で「Oを〜される(被害)」という意味になります。<br>財布(wallet)は「盗まれる」側なので、受動関係を表す過去分詞 stolen が入ります。"
            },
            {
                question: "It is necessary that he ( 　 ) there at once.",
                options: ["goes", "go", "went", "has gone"],
                answer: 1, // go
                explanation: "【仮定法現在】要求・提案・必要などを表す形容詞(necessaryなど)や動詞に続く that 節内の動詞は、<b>(should +) 原形</b> になります。ここでは should が省略されているため go となります。"
            },
            {
                question: "This train will ( 　 ) you to the airport in 30 minutes.",
                options: ["take", "bring", "lead", "carry"],
                answer: 0, // take
                explanation: "【無生物主語と動詞の語法】「乗り物・道などが人を〜へ連れて行く」場合は <b>take A to B</b> を使います。<br>bring は「(話し手のいる場所へ)連れてくる」、lead は「案内する」ニュアンスが強いです。"
            }
        ];

        // --- 状態管理変数 ---
        let currentQuestionIndex = 0;
        let score = 0;
        let canAnswer = true;

        // --- DOM要素 ---
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const resultScreen = document.getElementById('result-screen');
        const questionCounterSpan = document.getElementById('question-counter');
        const scoreCounterSpan = document.getElementById('score-counter');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const feedbackContainer = document.getElementById('feedback-container');
        const feedbackBox = document.getElementById('feedback-box');
        const feedbackBadge = document.getElementById('feedback-badge');
        const explanationText = document.getElementById('explanation-text');
        const nextBtn = document.getElementById('next-btn');

        // --- ゲーム開始 ---
        function startGame() {
            currentQuestionIndex = 0;
            score = 0;
            updateScoreDisplay();
            
            startScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            
            loadQuestion();
        }

        // --- 問題読み込み ---
        function loadQuestion() {
            canAnswer = true;
            const currentQuiz = quizData[currentQuestionIndex];
            
            // 表示の更新
            questionCounterSpan.innerText = currentQuestionIndex + 1;
            
            // 問題文の表示（( ) を少し目立たせる）
            const formattedQuestion = currentQuiz.question.replace(/\( 　 \)/g, '<span class="text-blue-600 font-bold px-1 border-b-2 border-blue-600">( 　 )</span>');
            questionText.innerHTML = formattedQuestion;
            
            // フィードバック領域を隠す
            feedbackContainer.classList.add('hidden');
            
            // 選択肢の生成
            optionsContainer.innerHTML = '';
            currentQuiz.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left bg-white border-2 border-gray-200 hover:border-green-400 hover:bg-green-50 rounded-xl p-4 font-medium text-gray-700 transition duration-200 text-lg";
                btn.innerHTML = `<span class="inline-block w-8 text-gray-400">${index + 1}.</span> ${option}`;
                btn.onclick = () => selectOption(index);
                optionsContainer.appendChild(btn);
            });
        }

        // --- 選択肢クリック時の処理 ---
        function selectOption(selectedIndex) {
            if (!canAnswer) return;
            canAnswer = false; // 連続クリック防止
            
            const currentQuiz = quizData[currentQuestionIndex];
            const isCorrect = (selectedIndex === currentQuiz.answer);
            const allButtons = optionsContainer.children;

            // ボタンのスタイル更新
            for(let i = 0; i < allButtons.length; i++){
                allButtons[i].disabled = true;
                allButtons[i].classList.remove('hover:border-green-400', 'hover:bg-green-50');
                
                if(i === currentQuiz.answer) {
                    // 正解の選択肢をハイライト
                    allButtons[i].classList.remove('border-gray-200');
                    allButtons[i].classList.add('border-green-500', 'bg-green-100', 'text-green-800', 'font-bold');
                } else if (i === selectedIndex && !isCorrect) {
                    // 間違って選んだ選択肢をハイライト
                    allButtons[i].classList.remove('border-gray-200');
                    allButtons[i].classList.add('border-red-400', 'bg-red-50', 'text-red-800', 'opacity-70');
                } else {
                    // それ以外は少し薄くする
                    allButtons[i].classList.add('opacity-50');
                }
            }

            // スコアとフィードバックの処理
            if (isCorrect) {
                score++;
                updateScoreDisplay();
                feedbackBox.className = "p-5 rounded-xl mb-6 border bg-green-50 border-green-200";
                feedbackBadge.innerHTML = "⭕ 正解！";
                feedbackBadge.className = "inline-block px-3 py-1 rounded text-sm font-bold mb-3 bg-green-500 text-white";
            } else {
                feedbackBox.className = "p-5 rounded-xl mb-6 border bg-red-50 border-red-200";
                feedbackBadge.innerHTML = "❌ 不正解...";
                feedbackBadge.className = "inline-block px-3 py-1 rounded text-sm font-bold mb-3 bg-red-500 text-white";
            }
            
            // 解説テキストの挿入
            explanationText.innerHTML = currentQuiz.explanation;
            
            // 最終問題ならボタンのテキストを変更
            if(currentQuestionIndex === quizData.length - 1) {
                nextBtn.innerHTML = "結果を見る 🏆";
                nextBtn.className = "w-full bg-purple-500 hover:bg-purple-600 text-white font-bold py-4 px-4 rounded-xl shadow transition duration-200 text-lg";
            } else {
                nextBtn.innerHTML = "次の問題へ ➔";
                nextBtn.className = "w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-4 rounded-xl shadow transition duration-200 text-lg";
            }

            // フィードバック領域を表示
            feedbackContainer.classList.remove('hidden');
            
            // スクロールを少し下げる（スマホ対応）
            setTimeout(() => {
                feedbackContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        // --- 次の問題へ ---
        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        // --- 結果表示 ---
        function showResult() {
            gameScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            
            document.getElementById('final-score').innerText = score;
            
            const resultMessage = document.getElementById('result-message');
            const resultIcon = document.getElementById('result-icon');
            
            if (score === quizData.length) {
                resultIcon.innerText = "👑";
                resultMessage.innerText = "パーフェクト！高校英文法は完璧です！\n大学受験やTOEICでも高得点が狙えます！";
                resultMessage.className = "text-xl font-bold text-green-600 mb-8 whitespace-pre-line";
            } else if (score >= 7) {
                resultIcon.innerText = "✨";
                resultMessage.innerText = "素晴らしい！かなりの実力がついています。\n間違えた箇所を復習すれば完璧です。";
                resultMessage.className = "text-xl font-bold text-blue-600 mb-8 whitespace-pre-line";
            } else if (score >= 4) {
                resultIcon.innerText = "👍";
                resultMessage.innerText = "惜しい！基本的な知識はあります。\n解説を読んで、あやふやな文法事項を固めましょう。";
                resultMessage.className = "text-xl font-medium text-yellow-600 mb-8 whitespace-pre-line";
            } else {
                resultIcon.innerText = "📚";
                resultMessage.innerText = "伸びしろがたっぷりあります！\nまずは解説をじっくり読んで、基礎からもう一度見直してみましょう。";
                resultMessage.className = "text-xl font-medium text-gray-700 mb-8 whitespace-pre-line";
            }
        }

        // --- タイトルに戻る ---
        function resetGame() {
            resultScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
        }

        // --- ユーティリティ ---
        function updateScoreDisplay() {
            scoreCounterSpan.innerText = score;
        }

    </script>
</body>
</html>
